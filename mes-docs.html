<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mes Documents - Edu Docs Premium</title>
  <meta name="theme-color" content="#6C3CE1">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- PAGE NON CONNECTÉ -->
  <div id="notLoggedIn" style="display:none">
    <div class="container" style="position:relative;z-index:1;">
      <div class="empty" style="padding-top:100px">
        <div class="empty-icon">🔐</div>
        <div class="empty-title">Connexion requise</div>
        <div class="empty-sub" style="margin-bottom:24px">Connecte-toi pour voir tes documents achetés</div>
        <button class="btn btn-primary" onclick="window.location.href='auth.html'">Se connecter</button>
      </div>
    </div>
  </div>

  <!-- PAGE MES DOCUMENTS -->
  <div id="docsPage" style="display:none">
    <div class="container" style="padding-bottom:100px; position:relative; z-index:1;">
      <div class="page-header">
        <div class="page-title">📚 Mes Documents</div>
        <div class="page-subtitle" id="docsSubtitle">Tes documents achetés</div>
      </div>

      <!-- Stats rapides -->
      <div style="display:flex; gap:10px; margin-bottom:20px;">
        <div style="flex:1; background:var(--card); border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px; text-align:center;">
          <div style="font-size:24px; font-weight:800; color:var(--accent2);" id="countValidated">0</div>
          <div style="font-size:11px; color:var(--muted);">Disponibles</div>
        </div>
        <div style="flex:1; background:var(--card); border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px; text-align:center;">
          <div style="font-size:24px; font-weight:800; color:var(--accent);" id="countPending">0</div>
          <div style="font-size:11px; color:var(--muted);">En attente</div>
        </div>
        <div style="flex:1; background:var(--card); border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px; text-align:center;">
          <div style="font-size:24px; font-weight:800; color:var(--primary-light);" id="countTotal">0</div>
          <div style="font-size:11px; color:var(--muted);">Total</div>
        </div>
      </div>

      <div id="myDocsLoading" class="loading-wrap">
        <div class="spinner spinner-lg"></div>
        <span>Chargement de tes documents...</span>
      </div>

      <div id="myDocsList"></div>
    </div>

    <nav class="bottom-nav">
      <div class="nav-item" onclick="window.location.href='index.html'">
        <span class="nav-item-icon">🏠</span>
        <span>Accueil</span>
      </div>
      <div class="nav-item active">
        <span class="nav-item-icon">📚</span>
        <span>Mes docs</span>
      </div>
      <div class="nav-item" onclick="window.location.href='auth.html'">
        <span class="nav-item-icon">👤</span>
        <span>Compte</span>
      </div>
    </nav>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
