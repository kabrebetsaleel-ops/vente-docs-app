<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin - Edu Docs Premium</title>
  <meta name="theme-color" content="#6C3CE1">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- LOGIN ADMIN -->
  <div id="loginScreen">
    <div class="admin-login">
      <div class="admin-login-card">
        <div class="admin-icon">🛡️</div>
        <h2 style="text-align:center;margin-bottom:6px;font-size:20px">Espace Admin</h2>
        <p style="text-align:center;color:var(--muted);font-size:13px;margin-bottom:24px">Accès réservé à l'administrateur</p>
        <form id="adminLoginForm">
          <div class="form-group">
            <label class="form-label">Mot de passe</label>
            <input class="form-input" type="password" id="adminPass" placeholder="••••••••" required>
          </div>
          <button class="btn btn-primary btn-full" type="submit" id="adminLoginBtn">
            🔐 Se connecter
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- DASHBOARD ADMIN -->
  <div id="adminDashboard" style="display:none">
    <div class="admin-container" style="padding-top:16px; padding-bottom:40px;">

      <div class="admin-header">
        <div>
          <div class="admin-title">Dashboard 🚀</div>
          <div style="font-size:12px;color:var(--muted)">Edu Docs Premium</div>
        </div>
        <button class="btn btn-danger btn-sm" id="logoutBtn">Déconnexion</button>
      </div>

      <!-- STATS -->
      <div style="display:flex;gap:10px;margin-bottom:20px;">
        <div style="flex:1;background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:var(--radius-sm);padding:14px;text-align:center;">
          <div style="font-size:26px;font-weight:800;" id="statDocs">0</div>
          <div style="font-size:11px;opacity:0.8;">Documents</div>
        </div>
        <div style="flex:1;background:linear-gradient(135deg,var(--accent),#F97316);border-radius:var(--radius-sm);padding:14px;text-align:center;">
          <div style="font-size:26px;font-weight:800;color:#000;" id="statPending">0</div>
          <div style="font-size:11px;opacity:0.8;color:#000;">En attente</div>
        </div>
        <div style="flex:1;background:linear-gradient(135deg,var(--accent2),#059669);border-radius:var(--radius-sm);padding:14px;text-align:center;">
          <div style="font-size:26px;font-weight:800;" id="statValidated">0</div>
          <div style="font-size:11px;opacity:0.8;">Validées</div>
        </div>
      </div>

      <!-- PUBLIER UN DOCUMENT -->
      <div class="admin-card">
        <div class="admin-card-title">➕ Publier un document</div>
        <form id="docForm">
          <div class="form-group">
            <label class="form-label">Titre</label>
            <input class="form-input" type="text" id="docTitle" placeholder="Ex: 9 Devoirs de Maths 1ère D" required>
          </div>
          <div class="admin-grid">
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">Niveau</label>
              <select class="form-input" id="docNiveau" required>
                <option>6ème</option><option>5ème</option><option>4ème</option>
                <option>3ème</option><option>Seconde</option><option>Première</option><option>Terminale</option>
              </select>
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">Matière</label>
              <select class="form-input" id="docMatiere" required>
                <option>Mathématiques</option><option>Physique</option><option>Chimie</option>
                <option>Français</option><option>Anglais</option><option>SVT</option>
                <option>Histoire-Géo</option><option>Philosophie</option>
              </select>
            </div>
          </div>
          <div style="height:12px"></div>
          <div class="form-group">
            <label class="form-label">Prix (FCFA)</label>
            <input class="form-input" type="number" id="docPrice" placeholder="Ex: 500" required>
          </div>
          <div class="form-group">
            <label class="form-label">ID Google Drive (PDF)</label>
            <input class="form-input" type="text" id="docDriveId" placeholder="1JUTfSFXs..." required>
          </div>
          <div class="form-group">
            <label class="form-label">URL Image couverture</label>
            <input class="form-input" type="url" id="docImage" placeholder="https://i.ibb.co/...">
          </div>
          <div class="form-group">
            <label class="form-label">Description</label>
            <textarea class="form-input" id="docDesc" rows="3" placeholder="Décris ce document..."></textarea>
          </div>
          <button class="btn btn-primary btn-full" type="submit" id="publishBtn">🚀 Publier le document</button>
        </form>
      </div>

      <!-- COMMANDES -->
      <div class="admin-card">
        <div class="admin-card-title">📦 Commandes à valider</div>
        <div id="ordersList">
          <div class="loading-wrap"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- DOCUMENTS -->
      <div class="admin-card">
        <div class="admin-card-title">📚 Mes documents (<span id="docsCount">0</span>)</div>
        <div id="docsList">
          <div class="loading-wrap"><div class="spinner"></div></div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
